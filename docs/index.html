<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>김보미의 WKBL 해설 브리핑 대시보드</title>
  <link rel="stylesheet" href="assets/style.css" />
</head>
<body>

<header>
  <div class="container">
    <span class="header-title">김보미의 WKBL 해설 브리핑 대시보드</span>
    <span class="header-meta" id="last-updated">데이터 로딩 중...</span>
  </div>
</header>

<main class="container">

  <!-- 팀 선택 섹션 -->
  <section class="section">
    <h2 class="section-title">브리핑 생성</h2>
    <div class="card">
      <div class="team-selector">
        <select id="select-team-a">
          <option value="">홈팀 선택</option>
        </select>
        <span class="vs-label">VS</span>
        <select id="select-team-b">
          <option value="">원정팀 선택</option>
        </select>
        <button id="btn-briefing" class="btn-briefing" disabled>브리핑 보기</button>
      </div>
    </div>
  </section>

  <!-- 리그 순위 -->
  <section class="section">
    <h2 class="section-title">🏆 리그 순위</h2>
    <div class="card">
      <div id="standings-container">
        <p class="loading">순위 데이터를 불러오는 중...</p>
      </div>
    </div>
  </section>

  <!-- 브리핑 패널 -->
  <section class="section">
    <h2 class="section-title">🔍 맞대결 브리핑</h2>
    <div id="briefing-panel">
      <!-- app.js가 동적으로 채움 -->
    </div>
  </section>

  <!-- 경기 일정 -->
  <section class="section schedule-section">
    <h2 class="section-title">📅 시즌 경기 일정</h2>
    <div class="card">
      <div id="schedule-container">
        <p class="loading">일정 데이터를 불러오는 중...</p>
      </div>
    </div>
  </section>

</main>

<!-- 게임 프리뷰 모달 -->
<div id="game-modal" class="modal-backdrop" hidden>
  <div class="modal-box" role="dialog" aria-modal="true">
    <button class="modal-close" id="modal-close-btn" aria-label="닫기">✕</button>
    <div id="modal-content"></div>
  </div>
</div>

<script src="assets/app.js"></script>
</body>
</html>
